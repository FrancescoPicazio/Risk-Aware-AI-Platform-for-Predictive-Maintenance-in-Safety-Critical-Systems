services:
  # Streaming Simulator
  simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.simulator
    container_name: risk-aware-simulator
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - SIMULATION_SPEED=1.0
    volumes:
      - ../data/raw:/app/data/raw
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # MQTT Broker (infrastructure)
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: risk-aware-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    networks:
      - risk-aware-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Data Ingestion
  ingestion:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestion
    container_name: risk-aware-ingestion
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
    volumes:
      - ../data/raw:/app/data/raw
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Feature Engineering
  feature-engineering:
    build:
      context: ..
      dockerfile: docker/Dockerfile.feature_engineering
    container_name: risk-aware-feature-eng
    depends_on:
      - mqtt-broker
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
    volumes:
      - ../data/processed:/app/data/processed
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Training Pipeline
  training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    container_name: risk-aware-training
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - MODEL_OUTPUT_PATH=/app/data/model_artifacts
    volumes:
      - ../data/processed:/app/data/processed
      - ../data/model_artifacts:/app/data/model_artifacts
      - ../data/results:/app/data/results
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Uncertainty Quantification (MC Dropout + Calibration)
  uncertainty:
    build:
      context: ..
      dockerfile: docker/Dockerfile.uncertainty
    container_name: risk-aware-uncertainty
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - MODEL_PATH=/app/data/model_artifacts
      - MC_SAMPLES=100
      - INPUT_TOPIC=cmapss/uncertainty
    volumes:
      - ../data/model_artifacts:/app/data/model_artifacts:ro
      - ../data/processed:/app/data/processed:ro
      - ../data/raw:/app/data/raw:ro
      - ../data/results:/app/data/results
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Probabilistic Failure Modeling (§4.6 ARCHITECTURE.md)
  failure-modeling:
    build:
      context: ..
      dockerfile: docker/Dockerfile.failure
    container_name: risk-aware-failure-modeling
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - FIT_WEIBULL=true
    volumes:
      - ../data/metrics_and_results:/app/data/metrics_and_results
      - ../data/results:/app/data/results:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Risk Decision Engine (§4.7 ARCHITECTURE.md)
  risk-decision:
    build:
      context: ..
      dockerfile: docker/Dockerfile.risk_decision
    container_name: risk-aware-risk-decision
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - RISK_THRESHOLD=0.7
      - SEVERITY_WEIGHT=1.0
      - HORIZON_CYCLES=30
    volumes:
      - ../data/metrics_and_results:/app/data/metrics_and_results
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Economic Optimization Layer (§4.8 ARCHITECTURE.md)
  economic-optimization:
    build:
      context: ..
      dockerfile: docker/Dockerfile.economic
    container_name: risk-aware-economic-optimization
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - C_EARLY=1000
      - C_LATE=10000
      - DOWNTIME_COST=5000
    volumes:
      - ../data/metrics_and_results:/app/data/metrics_and_results
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Risk & Cost Engine – fast-path bridge
  # Subscribe: cmapss/inference (RUL_PREDICTION) → Publish: cmapss/risk (RISK_DECISION)
  # Complements the full UQ pipeline (UncertaintyQuantification → ProbabilisticFailureModeling
  # → RiskDecisionEngine) by immediately routing streaming inference results to the risk topic.
  risk-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.risk_engine
    container_name: risk-aware-risk-engine
    depends_on:
      mqtt-broker:
        condition: service_healthy
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
    volumes:
      - ../data/results:/app/data/results
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

  # Inference API (FastAPI – standalone container on port 8000)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: risk-aware-api
    depends_on:
      mqtt-broker:
        condition: service_healthy
      risk-engine:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - MODEL_PATH=/app/data/model_artifacts
      - RESULTS_DIR=/app/data/results
      - PROCESSED_DIR=/app/data/processed
      - MC_SAMPLES=100
      - MODEL_RELOAD_INTERVAL=300
    volumes:
      - ../data/processed:/app/data/processed:ro
      - ../data/model_artifacts:/app/data/model_artifacts:ro
      - ../data/results:/app/data/results:ro
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Monitoring & Drift Detection Module (§4.10 ARCHITECTURE.md)
  monitoring:
    build:
      context: ..
      dockerfile: docker/Dockerfile.monitoring
    container_name: risk-aware-monitoring
    depends_on:
      mqtt-broker:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      - MQTT_BROKER=mqtt-broker
      - MQTT_PORT=1883
      - DRIFT_THRESHOLD=0.15
      - PERF_DELTA_PCT=10.0
      - ROLLING_WINDOW=50
      - ENABLE_API=true
      - API_PORT=8001
    volumes:
      - ../data/metrics:/app/data/metrics
      - ../data/results:/app/data/results:ro
      - ../data/metrics_and_results:/app/data/metrics_and_results
      - ../data/processed:/app/data/processed:ro
      - ../data/model_artifacts:/app/data/model_artifacts
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Scheduler – publishes cron triggers via MQTT (STREAMING, TRAINING, MONITORING)
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    container_name: risk-aware-scheduler
    depends_on:
      - simulator
      - training
      - monitoring
    environment:
      - TRAINING_SCHEDULE=0 2 * * *
      - MONITORING_SCHEDULE=*/15 * * * *
    volumes:
      - ../logs:/app/logs
    networks:
      - risk-aware-network
    restart: unless-stopped

volumes:
  mqtt-data:
  mqtt-logs:

networks:
  risk-aware-network:
    driver: bridge
